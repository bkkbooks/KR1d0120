body:
  text: 蔡氏喪服譜以二瓦器盛始死之祭繫於木裹以葦席置庭中近南名為重今之凶門是其遺象也禮記既虞而作主今未葬未有主故以重當之禮稱為主道此其義也晉書禮志中劉氏問時人祠有板板為用當主為是神座之榜題謨答今代有祠板木乃始禮之奉廟也亦有題今板書名號亦是題主之意安昌公荀氏祠制神板皆正長尺一寸博四寸五分厚五寸八分大書某祖考某封之神座夫人某氏之神座以下皆然書訖蠟油炙令入理刮拭之通典卷四十八劉氏問曰非小宗及一家之嫡分張不在一處得立廟不答曰禮宗子在他國而庶子在家則祭先儒說曰有子孫在不可以乏先祖之祀也苟在他國雖是宗子猶不得立況非嫡長乎不乏祀者明宗子在他國不得廟祭故令庶子祭於家也通典卷五十一己拜時壻遭小功喪或婦遭大功喪可迎謨曰古人君命爵其臣在遠則遣使太公即封齊五侯九伯實得征之即王使召康公所命也至今詔使拜授亦當如此豈有疑乎易曰家有嚴君焉父母之謂今壻父命使拜其父女父遣女拜受此命即是太公受命於召康公今人拜爵詔於使也而云未拜舅姑未為成婦然則太公未拜周王亦非方伯乎不修婦禮是其失耳至於是婦與非自當以典禮為正安得從彼所行假令太公不行臣禮王者便當不臣之乎謂拜壻之宗親與拜舅姑於禮無異通典卷五十九范朗問曰甲有庶兄乙為人後甲妹景已許嫁而未出今乙亡如鄭元之意已許嫁便旁降親者景今應為乙服小功本是周親今於禮可得嫁景不答曰按禮大功之末可以嫁子不言降服復有異也兄在大功嫁服小功之妹猶父在大功嫁小功之女也謂甲今嫁景與禮無違范難曰禮小功不稅降而小功則稅之又小功不易喪之練冠而長殤中殤之小功則變三年之葛又小功之末可以娶妻而下殤之小功則不可據此數事則明降服正服所施各異今子同之其理何居答曰夫服有降有正此禮之常也若其所施必皆不同則當舉其一例無為復說稅與娶也今而然者明其所施有同有異不可以一例舉故隨事而言也鄭君以為下殤小功不可娶者本𧞓縗之親也按長殤大功亦𧞓縗親而禮言下殤不可以娶而不言長殤不可以嫁明殤降之服雖不可娶而可嫁也所以然者陽倡陰和男行女從和從者輕倡行者重二者不同故其制亦異也范又難曰禮舉輕以明重下殤猶不可娶言長殤大功何可以嫁知禮所謂大功末者唯正服大功末耳答曰下殤不可娶妻者謂己身也吾言長殤可以嫁子者謂女父也身自行之於事為重但施於子其理差輕然則下殤之不娶未足以明長殤之不嫁也通典卷六十解遂問曰庶子喪所生嫡母尚存不知制輕重答曰士之妾子服其母與凡人喪母同通典卷九十四答王濛問曰前母之黨應為親不喪服但問尊卑長幼拜敬之禮也代多此事而所不同惠帝時尚書令滿武秋是曹彥真前母之兄而不為內外之親如他人吾昔以問江思悛悛以為人不疑繼母之黨而疑前母者以不相及也繼祖母亦有不相及者而皆與其黨為親何至前母而獨疑之吾謂此言是魏時長沙人王毖身在中國遇吳魏而絕更娶生昌昌父母亡後吳平聞毖前妻久亡昌為前母追服時人疑之武皇詔使朝臣通議安平獻王孚以為禮與祖父母離隔未嘗相見者不追如獻王此議則前母之黨不應為親也獻王所據是鄭氏之說吾謂鄭義為失時卞仁劉叔龍議謂昌應服三年吾以卞劉議為允通典卷九十五問者曰乙是甲族兄子也二人之母則姊妹也以外親言之則是從母之子應服緦麻以同宗言之則六代之親知禮無服今甲亡乙應制不謨按禮記云同姓從宗合族屬異姓主名理際會先儒說曰異姓謂未嫁者也正其母與婦之名也禮記又云其夫屬乎父道者妻皆母道也今甲之父與乙於班為族祖則其妻亦有祖母之名不復得而從母也凡親屬之名妻從其夫子從其母不得為從母則子亦不得為從母之子也親名正服亦隨之謂乙應同六代之制不應服也難者曰禮所云異姓主名理際會本是他人唯以來嫁為親故尊卑親疏從其所適至於從母者骨肉之親小功之服也今以所適無服之親便從無服之制是為以疏奪親也適他人者猶為之服來適同宗而便絕之豈其理乎答曰禮大夫之娶皆有姪娣而大夫之子於庶母無服若論本親則此庶母亦是從母也今來為父妾則廢從母之名而從庶母之稱絕小功之服而從無服之制此禮之成典也推此而論知適他人者從其本親來適同宗則從其所適不得係本此所謂異姓主名理際會也同上小記生不及祖父母諸父昆弟而父稅喪子則不謨以為大功猶稅況此三親情次於所生服亞於斬縗雖不相見或者音問時通而絕其稅服豈稱情乎夫言生不及者謂彼已沒己及生耳豈是同時並存之名若鄭說不以生年為主但不相見便為不及則此祖父母即復可生不及孫而父亦生不及子兄復生不及弟也此之不辭亦已甚矣自古及今未有此言也鄭君見禮文有弟弟不得先兄生不知所以通其義故因而立此說非禮意也吾謂此直長一弟字耳書歷千載又遭暴秦錯謬非一王氏說云己生之時祖父母已卒也諸父謂伯叔也昆弟者伯叔之子也此於情為允又生不及之名亦得通然既謂諸父為伯叔而復稱伯叔之兄弟於文煩重又不說己聞兄弟當稅與不於制亦闕未盡善也然猶賢乎鄭氏以同時並存為生不及通典卷九十八甲父為散騎侍郎在洛軍覆奔城皋病亡一子相隨殯葬如禮甲先與母弟避地江南聞喪行服三年而除道險未得奔墓而其弟成婚或謂服可除不宜以婚者謨以為凶哀之制除則吉樂之事行矣且男女之會禮之所急故小功卒哭可以娶妻三年之喪吉祭而復寢魯文於祥月而納幣晉文未葬喪而納室春秋左氏傳曰婦養姑者也又曰娶元妃以奉粢盛由此言娶妻者所為義大矣所奉事重矣又夫冠者加己之服耳非若婚娶有事親奉宗廟繼嗣之事而冠有金石之樂婚則三日不舉金石之樂孰若不舉之戚加己之事孰若奉親之重今譏其婚而許其冠斯何義也不亦乖乎或疑甲省墓稽留者謨以為奔墓者雖孝子罔極之情然實無益之事非亡身之所也故禮奔喪不以夜行避危害也今中州喪亂道路險絕墓墳毀廢名家人士皆有之而無一人致身者蓋以路險體弱有危亡之憂非孝子之道故也而曾無譏責何至甲獨云不可乎且甲尋已致身非如不赴之人也塋兆平安非如毀發之難也又是時甲母篤病營毉藥而不可違闕侍養投身危險必貽老母憂勤哉昔鄭有尉止之亂子西子產父死於朝子西不儆而先赴見譏於典籍子產成列而後出見善於春秋此經典之明義也並同上改葬斬縗禮言緦者謂緦親以上皆反服也通典卷一百二或問改葬服緦今甲當遷葬而先有兄喪在殯為當何服謨答亦應服緦禮三年之喪既練而遭緦麻之喪則服其服往哭之凡喪相易以重易輕至於此事則以輕易重所以然者臨其喪故也卑者猶然況至尊乎謂甲臨喪應服緦麻同上傳云不以兄弟之服服至尊者乃始喪正服耳同上王濛引蔡謨
